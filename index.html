<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="locked">

    <header class="hero">
        <h1 class="nama-couple">
            <span class="nama-kiri">Hannah</span>
            <span class="tanda">&</span>
            <span class="nama-kanan">Daniel</span>
        </h1>
        <p class="tgl-acara">23 Agustus 2025</p>
        <button class="btn-primary" onclick="bukaUndangan()">Buka Undangan</button>
    </header>

    <main id="konten-undangan" style="display: none;">
        <section class="section bg-sage">
            <div class="content-wrapper">
                <div class="text-content">
                    <h2 class="animate-down">Kisah Cinta Kami</h2>
                    <div id="typing-text" class="typing-container"></div>
                </div>

                <img src="https://images.unsplash.com/photo-1515934751635-c81c6bc9a2d8?q=80&w=400"
                    class="img-main" alt="Pasangan">
            </div>
        </section>

        <section class="section bg-light-soft" id="acara">
            <h2 class="title-dark">Detail Acara</h2>
            <div class="info-grid-soft">
                <div class="card-soft">
                    <h2>Akad Nikah</h2>
                    <p>08:00 WIB - Selesai</p>
                    <p class="location-text">Masjid Agung, Jakarta</p>
                </div>
                <div class="card-soft">
                    <h2>Resepsi</h2>
                    <p>11:00 WIB - Selesai</p>
                    <p class="location-text">Grand Ballroom, Jakarta</p>
                </div>
            </div>
        </section>

        <section class="section bg-sage" id="galeri">
            <h2 class="animate-fade">Galeri Kenangan</h2>

            <div class="gallery-grid">
                <div class="gallery-item">
                    <img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?q=80&w=800" class="gal-img" alt="Kenangan 1" loading="lazy">
                </div>
                <div class="gallery-item">
                    <img src="https://images.unsplash.com/photo-1522673607200-165d1b667b54?q=80&w=800" class="gal-img" alt="Kenangan 2" loading="lazy">
                </div>
                <div class="gallery-item">
                    <img src="https://images.unsplash.com/photo-1515934751635-c81c6bc9a2d8?q=80&w=800" class="gal-img" alt="Kenangan 3" loading="lazy">
                </div>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>

</html>
